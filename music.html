<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CCX的个人博客 - 音乐</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ===== 完整样式（与之前一致） ===== */
        :root {
            --primary: #4f8cf7;
            --primary-dark: #3a6fd1;
            --bg: #f0f4ff;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            --radius: 16px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Segoe UI', system-ui, sans-serif;
            --nav-height: 68px;
        }
        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #e2e8f0;
            --text-light: #94a3b8;
            --border: #334155;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); line-height:1.7; transition: background var(--transition), color var(--transition); padding-top: var(--nav-height); }
        a { color: var(--primary); text-decoration: none; }
        .container { max-width:1200px; margin:0 auto; padding:0 24px; }
        .navbar { position:fixed; top:0; left:0; right:0; height:var(--nav-height); background:var(--card-bg); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 32px; z-index:1000; backdrop-filter:blur(12px); background:rgba(var(--card-bg-rgb,255,255,255),0.85); transition: background var(--transition), border-color var(--transition); }
        .navbar { --card-bg-rgb:255,255,255; }
        [data-theme="dark"] .navbar { --card-bg-rgb:30,41,59; }
        .logo { font-size:1.5rem; font-weight:700; color:var(--text); letter-spacing:-0.5px; }
        .logo span { color:var(--primary); }
        .nav-links { display:flex; align-items:center; gap:28px; list-style:none; }
        .nav-links a { color:var(--text-light); font-weight:500; font-size:0.95rem; position:relative; }
        .nav-links a::after { content:''; position:absolute; bottom:-4px; left:0; width:0; height:2px; background:var(--primary); transition:width var(--transition); }
        .nav-links a:hover::after, .nav-links a.active::after { width:100%; }
        .nav-links a:hover, .nav-links a.active { color:var(--text); }
        .theme-toggle { background:none; border:none; color:var(--text-light); font-size:1.2rem; cursor:pointer; padding:6px 10px; border-radius:8px; transition:background var(--transition), color var(--transition); }
        .theme-toggle:hover { background:var(--border); color:var(--text); }
        .mobile-menu-btn { display:none; background:none; border:none; color:var(--text); font-size:1.5rem; cursor:pointer; }
        .page-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; margin:24px 0 20px; }
        .page-header h2 { font-size:2rem; font-weight:700; }
        .back-home { background:var(--card-bg); border:1px solid var(--border); padding:8px 20px; border-radius:30px; font-weight:500; color:var(--text-light); transition:all var(--transition); display:inline-flex; align-items:center; gap:6px; }
        .back-home:hover { background:var(--primary); color:#fff; border-color:var(--primary); }

        /* ===== 搜索框 ===== */
        .search-box {
            margin-bottom: 24px;
        }
        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid var(--border);
            border-radius: 30px;
            background: var(--card-bg);
            color: var(--text);
            font-size: 1rem;
            transition: all var(--transition);
            outline: none;
            font-family: inherit;
        }
        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 140, 247, 0.2);
        }
        .search-box input::placeholder {
            color: var(--text-light);
        }
        .search-stats {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-top: 6px;
            text-align: right;
        }

        /* ===== 卡片网格 ===== */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 28px;
            margin: 0 0 40px;
            justify-items: center;
        }
        .item-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 20px;
            box-shadow: var(--shadow);
            transition: all var(--transition);
            max-width: 320px;
            width: 100%;
        }
        .item-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
        }
        .item-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 10px;
            background: var(--bg);
        }
        .item-card .item-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin: 12px 0 6px;
        }
        .item-card .item-desc {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 12px;
        }
        .download-btn {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: background var(--transition);
            font-family: inherit;
        }
        .download-btn:hover {
            background: var(--primary-dark);
            color: #fff;
        }
        .no-result {
            text-align: center;
            padding: 40px 0;
            color: var(--text-light);
            font-size: 1.1rem;
            display: none;
            grid-column: 1 / -1;
        }

        .footer {
            border-top: 1px solid var(--border);
            padding: 28px 0;
            margin-top: 40px;
            text-align: center;
            color: var(--text-light);
            font-size: 0.9rem;
            background: var(--card-bg);
        }
        @media (max-width:768px) {
            .nav-links { display:none; flex-direction:column; position:absolute; top:var(--nav-height); left:0; right:0; background:var(--card-bg); padding:20px 28px; gap:16px; border-bottom:1px solid var(--border); box-shadow:var(--shadow); }
            .nav-links.open { display:flex; }
            .mobile-menu-btn { display:block; }
            .card-grid { grid-template-columns:1fr; }
            .page-header { flex-direction:column; align-items:flex-start; }
            .navbar { padding:0 20px; }
        }
        @media (max-width:480px) { .container { padding:0 16px; } }
        ::-webkit-scrollbar { width:8px; } ::-webkit-scrollbar-track { background:var(--bg); } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:8px; } ::-webkit-scrollbar-thumb:hover { background:var(--primary); }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <a href="index.html" class="logo">CCX<span>.</span></a>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">首页</a></li>
            <li><a href="music.html" class="active">音乐</a></li>
            <li><a href="game.html">游戏</a></li>
            <li><a href="code.html">代码</a></li>
            <li><a href="aviation.html">航空</a></li>
            <li><a href="article.html">文章</a></li>
            <li><button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button></li>
        </ul>
        <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
    </nav>

    <!-- 主体 -->
    <main class="container">
        <div class="page-header">
            <h2><i class="fas fa-music" style="color:var(--primary);"></i> 音乐下载</h2>
            <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> 返回主页</a>
        </div>

        <!-- ===== 搜索框 ===== -->
        <div class="search-box">
            <input type="text" id="searchMusic" placeholder="🎵 输入歌曲名或歌手名搜索..." />
            <div class="search-stats" id="searchStats">共 <span id="totalCount">0</span> 首歌曲</div>
        </div>

        <!-- ===== 音乐列表 ===== -->
        <div class="card-grid" id="musicGrid">
            <!-- 音乐卡片 1：Wake -->
            <div class="item-card" data-title="Wake 3D高燃版 VZEUS 音频 高燃 混音">
                <img src="image/wake.avif" alt="Wake 封面">
                <div class="item-title">Wake (3D高燃版)</div>
                <div class="item-desc">VZEUS 音频 · 高燃混音，震撼听觉</div>
                <button class="download-btn" onclick="downloadMusic('music/Wake_3D高燃版_VZEUS_音频.mp3', 'Wake_3D高燃版.mp3')">
                    <i class="fas fa-download"></i> 下载
                </button>
            </div>
            <!-- 示例卡片 2：可添加更多 -->
            <div class="item-card" data-title="III 经典">
                <img src="image/III.avif" alt="III封面">
                <div class="item-title">III</div>
                <div class="item-desc">“ 2 分 58 秒开始，相见恨晚！” </div>
                <button class="download-btn" onclick="downloadMusic('music/III.mp4', 'III.mp4')">
                    <i class="fas fa-download"></i> 下载
                </button>
            </div>
            <div class="item-card" data-title="Lucky girl Luckygirl Lucky Lucky+gogirl lucky_girl luckygirl">
                <img src="image/lucky_girl.avif" alt="Lucky girl 封面">
                <div class="item-title">Lucky girl</div>
                <div class="item-desc">“你是北纬67度以北的雪.”</div>
                <button class="download-btn" onclick="downloadMusic('music/“你是北纬67度以北的雪.”_《Lucky+go girl》_音频.mp4', '“你是北纬67度以北的雪.”_《Lucky+go girl》_音频.mp4')">
                    <i class="fas fa-download"></i> 下载
                </button>
            </div>
            <!-- 无结果提示 -->
            <div class="no-result" id="noResult">😅 没有找到匹配的歌曲</div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 CCX · 用 <span style="color:#f472b6;">♥</span> 书写 · 保持好奇</p>
            <p style="margin-top:4px; font-size:0.8rem;"><i class="fas fa-code"></i> 简洁 · 优雅 · 有温度</p>
        </div>
    </footer>

    <script>
        // ===== 主题切换 & 菜单 =====
        (function() {
            const themeToggle = document.getElementById('themeToggle');
            const icon = themeToggle.querySelector('i');
            let currentTheme = localStorage.getItem('blog-theme') || 'light';
            function setTheme(t) { document.documentElement.setAttribute('data-theme', t); icon.className = t === 'dark' ? 'fas fa-sun' : 'fas fa-moon'; localStorage.setItem('blog-theme', t); currentTheme = t; }
            setTheme(currentTheme);
            themeToggle.addEventListener('click', function() { setTheme(currentTheme === 'light' ? 'dark' : 'light'); });

            const mobileBtn = document.getElementById('mobileMenuBtn');
            const navLinks = document.getElementById('navLinks');
            mobileBtn.addEventListener('click', function() { navLinks.classList.toggle('open'); const i=this.querySelector('i'); i.classList.toggle('fa-bars'); i.classList.toggle('fa-times'); });
            navLinks.querySelectorAll('a').forEach(l => { l.addEventListener('click', function() { if(window.innerWidth<=768){ navLinks.classList.remove('open'); const i=mobileBtn.querySelector('i'); i.classList.add('fa-bars'); i.classList.remove('fa-times'); } }); });
            const navbar = document.getElementById('navbar');
            window.addEventListener('scroll', function() { navbar.style.boxShadow = window.scrollY > 20 ? '0 4px 20px rgba(0,0,0,0.06)' : 'none'; }, { passive: true });
        })();

        // ===== 下载函数 =====
        function downloadMusic(fileUrl, fileName) {
            if (!fileName) { const parts = fileUrl.split('/'); fileName = parts[parts.length - 1]; }
            var xhr = new XMLHttpRequest();
            xhr.open('GET', fileUrl, true);
            xhr.responseType = 'blob';
            xhr.onload = function() {
                if (xhr.status === 200) {
                    var blob = xhr.response;
                    var a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = fileName;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    setTimeout(function() { URL.revokeObjectURL(a.href); }, 1000);
                } else {
                    alert('下载失败，请检查文件是否存在。\n将打开文件，请右键另存为。');
                    window.open(fileUrl, '_blank');
                }
            };
            xhr.onerror = function() {
                alert('读取失败，将打开文件，请右键另存为。');
                window.open(fileUrl, '_blank');
            };
            xhr.send();
        }

        // ===== 🎵 音乐搜索功能 =====
        (function() {
            const searchInput = document.getElementById('searchMusic');
            const musicCards = document.querySelectorAll('.item-card');
            const totalSpan = document.getElementById('totalCount');
            const noResult = document.getElementById('noResult');

            // 更新总数
            totalSpan.textContent = musicCards.length;

            searchInput.addEventListener('input', function() {
                const keyword = this.value.trim().toLowerCase();
                let visibleCount = 0;

                musicCards.forEach(card => {
                    const title = (card.dataset.title || '').toLowerCase();
                    // 也搜索描述文本（可选）
                    const desc = (card.querySelector('.item-desc')?.textContent || '').toLowerCase();
                    const match = keyword === '' || title.includes(keyword) || desc.includes(keyword);
                    if (match) {
                        card.style.display = '';
                        visibleCount++;
                    } else {
                        card.style.display = 'none';
                    }
                });

                // 显示/隐藏“无结果”提示
                if (visibleCount === 0 && keyword !== '') {
                    noResult.style.display = 'block';
                } else {
                    noResult.style.display = 'none';
                }

                // 更新统计
                const stats = document.getElementById('searchStats');
                if (keyword === '') {
                    stats.textContent = `共 ${musicCards.length} 首歌曲`;
                } else {
                    stats.textContent = `找到 ${visibleCount} 首匹配的歌曲`;
                }
            });
        })();
    </script>
</body>
</html>
