<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>音乐投稿工具</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f4ff; color: #1e293b; padding: 30px 20px; display: flex; justify-content: center; }
        .container { max-width: 1100px; width: 100%; background: #fff; border-radius: 24px; padding: 32px 36px; box-shadow: 0 8px 40px rgba(0,0,0,0.08); }
        .header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 6px; }
        .header h1 { font-size: 1.8rem; font-weight: 700; display: flex; align-items: center; gap: 12px; }
        .header h1 i { color: #4f8cf7; }
        .back-btn { background: #e2e8f0; color: #1e293b; padding: 8px 20px; border-radius: 30px; text-decoration: none; font-weight: 500; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px; }
        .back-btn:hover { background: #cbd5e1; }
        .subtitle { color: #64748b; margin-bottom: 28px; border-bottom: 1px solid #e2e8f0; padding-bottom: 14px; font-size: 1rem; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
        @media (max-width:850px){ .grid-2 { grid-template-columns:1fr; } .container { padding:20px; } }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
        .form-group label .optional { font-weight: 400; color: #94a3b8; font-size: 0.8rem; }
        .form-group label .required { color: #ef4444; }
        .form-group input { width: 100%; padding: 10px 14px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 0.95rem; background: #fafbfc; transition: border 0.2s; font-family: inherit; }
        .form-group input:focus { outline: none; border-color: #4f8cf7; background: #fff; box-shadow: 0 0 0 3px rgba(79,140,247,0.12); }
        .form-group .hint { font-size: 0.78rem; color: #94a3b8; margin-top: 3px; }
        .form-group .file-upload-area { border: 2px dashed #e2e8f0; border-radius: 10px; padding: 16px; text-align: center; cursor: pointer; transition: border-color 0.3s; background: #fafbfc; }
        .form-group .file-upload-area:hover { border-color: #4f8cf7; background: #f0f4ff; }
        .form-group .file-upload-area .file-status { font-size: 0.85rem; color: #64748b; margin-top: 4px; }
        .form-group .file-upload-area .file-status .file-name { font-weight: 600; color: #1e293b; }
        .form-group .file-upload-area i { font-size: 2rem; color: #4f8cf7; display: block; margin-bottom: 4px; }

        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 6px; }
        .btn { padding: 10px 28px; border: none; border-radius: 30px; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; font-family: inherit; }
        .btn-primary { background: #4f8cf7; color: #fff; }
        .btn-primary:hover { background: #3a6fd1; }
        .btn-secondary { background: #e2e8f0; color: #1e293b; }
        .btn-secondary:hover { background: #cbd5e1; }
        .btn-success { background: #22c55e; color: #fff; }
        .btn-success:hover { background: #16a34a; }

        .preview-box { background: #f8fafc; border-radius: 16px; padding: 24px 20px; border: 2px dashed #e2e8f0; min-height: 260px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: border-color 0.3s; }
        .preview-box.has-preview { border-color: #4f8cf7; border-style: solid; }
        .preview-box .empty-msg { color: #94a3b8; font-size: 0.95rem; text-align: center; }
        .preview-box .empty-msg i { font-size: 2rem; display: block; margin-bottom: 8px; opacity: 0.5; }
        .preview-card { background: #fff; border-radius: 16px; border: 1px solid #e2e8f0; padding: 20px; max-width: 300px; width: 100%; box-shadow: 0 4px 16px rgba(0,0,0,0.04); }
        .preview-card .pc-img { width: 100%; height: 150px; object-fit: cover; border-radius: 10px; background: #e2e8f0; }
        .preview-card .pc-title { font-weight: 700; font-size: 1.05rem; margin: 12px 0 4px; }
        .preview-card .pc-desc { color: #64748b; font-size: 0.9rem; margin-bottom: 12px; }
        .preview-card .pc-btn { display: inline-block; background: #4f8cf7; color: #fff; padding: 5px 18px; border-radius: 30px; font-size: 0.8rem; font-weight: 500; border: none; cursor: default; }
        .preview-card .pc-path { margin-top: 10px; font-size: 0.75rem; color: #94a3b8; }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1e293b; color: #fff; padding: 12px 32px; border-radius: 40px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.2); opacity: 0; transition: all 0.3s ease; pointer-events: none; font-size: 0.95rem; z-index: 999; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .tip-box { margin-top: 16px; background: #f1f5f9; padding: 16px 20px; border-radius: 12px; font-size: 0.9rem; color: #475569; line-height: 1.7; }
        .tip-box strong { color: #1e293b; }
        .save-status { margin-top: 12px; padding: 10px 16px; border-radius: 10px; font-size: 0.9rem; display: none; }
        .save-status.success { display: block; background: #dcfce7; color: #166534; border: 1px solid #86efac; }
        .save-status.error { display: block; background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .save-status.info { display: block; background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
        .save-status.uploading { display: block; background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }

        .upload-progress { margin-top: 12px; height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; display: none; }
        .upload-progress .bar { height: 100%; background: #4f8cf7; width: 0%; transition: width 0.3s; border-radius: 3px; }
        .upload-progress.show { display: block; }

        .auth-input { background: #f8fafc; border-radius: 12px; padding: 16px 18px; margin-bottom: 16px; border: 1px solid #e2e8f0; }
        .auth-input label { font-weight: 600; display: block; margin-bottom: 4px; font-size: 0.9rem; }
        .auth-input input { width: 100%; padding: 8px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; background: #fff; font-family: inherit; }
        .auth-input input:focus { outline: none; border-color: #4f8cf7; box-shadow: 0 0 0 3px rgba(79,140,247,0.12); }
        .auth-input .hint { font-size: 0.75rem; color: #94a3b8; margin-top: 4px; }

        @media (max-width:480px){ .container { padding:16px; } .header h1 { font-size:1.4rem; } .btn-group .btn { flex:1; justify-content:center; padding:10px 16px; font-size:0.85rem; } .toast { font-size:0.85rem; padding:10px 20px; white-space:normal; max-width:90%; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-headphones"></i> 音乐投稿</h1>
        <a href="music.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回音乐专栏</a>
    </div>
    <div class="subtitle">
        填写歌曲信息，选择封面和音乐文件，点击提交即可。
    </div>

    <div class="grid-2">
        <div>
            <div class="auth-input">
                <label><i class="fas fa-key"></i> 提交授权码 <span class="required">*</span></label>
                <input type="password" id="giteeToken" placeholder="请输入管理员提供的授权码" />
                <div class="hint">授权码由管理员提供，用于验证提交权限。</div>
            </div>

            <div class="form-group">
                <label>歌曲标题 <span class="required">*</span></label>
                <input type="text" id="songTitle" placeholder="例：Wake (3D高燃版)" />
            </div>
            <div class="form-group">
                <label>歌手/艺术家 <span class="optional">（可选）</span></label>
                <input type="text" id="artist" placeholder="例：VZEUS" />
            </div>
            <div class="form-group">
                <label>简短描述 <span class="optional">（可选）</span></label>
                <input type="text" id="desc" placeholder="例：高燃混音，震撼听觉" />
            </div>
            <div class="form-group">
                <label>搜索关键词 <span class="optional">（可选，空格分隔）</span></label>
                <input type="text" id="keywords" placeholder="例：3D高燃 混音 VZEUS" />
                <div class="hint">用于搜索功能，自动包含标题和歌手</div>
            </div>

            <div class="form-group">
                <label>封面图片 <span class="optional">（可选）</span></label>
                <div class="file-upload-area" id="coverUploadArea">
                    <i class="fas fa-image"></i>
                    <div>点击选择封面图片</div>
                    <div class="file-status" id="coverStatus">未选择文件</div>
                    <input type="file" id="coverFile" accept="image/*" style="display:none;" />
                </div>
            </div>

            <div class="form-group">
                <label>音乐文件 <span class="required">*</span></label>
                <div class="file-upload-area" id="musicUploadArea">
                    <i class="fas fa-music"></i>
                    <div>点击选择音乐文件</div>
                    <div class="file-status" id="musicStatus">未选择文件</div>
                    <input type="file" id="musicFile" accept="audio/*,video/*" style="display:none;" />
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" id="generateBtn"><i class="fas fa-eye"></i> 预览</button>
                <button class="btn btn-success" id="submitBtn"><i class="fas fa-upload"></i> 提交</button>
                <button class="btn btn-secondary" id="clearBtn"><i class="fas fa-undo-alt"></i> 清空</button>
            </div>

            <div class="upload-progress" id="uploadProgress">
                <div class="bar" id="progressBar"></div>
            </div>
            <div class="save-status" id="saveStatus"></div>
        </div>

        <div>
            <div style="font-weight:600; margin-bottom:12px;"><i class="fas fa-eye" style="color:#4f8cf7;"></i> 预览效果</div>
            <div class="preview-box" id="previewBox">
                <div class="empty-msg"><i class="fas fa-image"></i> 填写信息后点击「预览」</div>
            </div>
            <div class="tip-box">
                <strong><i class="fas fa-lightbulb" style="color:#f59e0b;"></i> 使用说明</strong><br />
                1. 填写歌曲信息（标题必填）。<br />
                2. 选择封面（可选）和音乐文件（必填）。<br />
                3. 点击「预览」确认效果。<br />
                4. 点击「提交」完成投稿。<br />
                5. 投稿后卡片代码会自动整理，管理员会将其添加到音乐列表中。
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
    // DOM refs
    const titleInput = document.getElementById('songTitle');
    const artistInput = document.getElementById('artist');
    const descInput = document.getElementById('desc');
    const keywordsInput = document.getElementById('keywords');
    const coverFileInput = document.getElementById('coverFile');
    const musicFileInput = document.getElementById('musicFile');
    const coverUploadArea = document.getElementById('coverUploadArea');
    const musicUploadArea = document.getElementById('musicUploadArea');
    const coverStatus = document.getElementById('coverStatus');
    const musicStatus = document.getElementById('musicStatus');
    const generateBtn = document.getElementById('generateBtn');
    const submitBtn = document.getElementById('submitBtn');
    const clearBtn = document.getElementById('clearBtn');
    const previewBox = document.getElementById('previewBox');
    const toast = document.getElementById('toast');
    const saveStatus = document.getElementById('saveStatus');
    const uploadProgress = document.getElementById('uploadProgress');
    const progressBar = document.getElementById('progressBar');
    const tokenInput = document.getElementById('giteeToken');

    const GITEE_OWNER = 'caocx-2012';
    const GITEE_REPO = 'home-pages';
    const GITEE_BRANCH = 'main';
    const GITEE_API = 'https://gitee.com/api/v5/repos/' + GITEE_OWNER + '/' + GITEE_REPO + '/contents';
    const CARDS_FILE = 'music-add-list.html';

    let selectedCover = null;
    let selectedMusic = null;

    const savedToken = localStorage.getItem('gitee_token');
    if (savedToken) tokenInput.value = savedToken;
    tokenInput.addEventListener('change', function() {
        localStorage.setItem('gitee_token', this.value);
    });

    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toast._timer);
        toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function setSaveStatus(msg, type) {
        saveStatus.textContent = msg;
        saveStatus.className = 'save-status ' + type;
        saveStatus.style.display = 'block';
    }

    function clearStatus() { saveStatus.style.display = 'none'; }

    coverUploadArea.addEventListener('click', () => coverFileInput.click());
    musicUploadArea.addEventListener('click', () => musicFileInput.click());
    coverFileInput.addEventListener('change', function() {
        if (this.files && this.files[0]) {
            selectedCover = this.files[0];
            coverStatus.innerHTML = `✅ <span class="file-name">${selectedCover.name}</span> (${(selectedCover.size/1024).toFixed(1)} KB)`;
            coverUploadArea.style.borderColor = '#22c55e';
        }
    });
    musicFileInput.addEventListener('change', function() {
        if (this.files && this.files[0]) {
            selectedMusic = this.files[0];
            musicStatus.innerHTML = `✅ <span class="file-name">${selectedMusic.name}</span> (${(selectedMusic.size/1024).toFixed(1)} KB)`;
            musicUploadArea.style.borderColor = '#22c55e';
        }
    });

    function generateCardData() {
        const title = titleInput.value.trim();
        const artist = artistInput.value.trim();
        const desc = descInput.value.trim();
        const keywords = keywordsInput.value.trim();
        if (!title) { showToast('❌ 请填写歌曲标题'); return null; }
        let coverFileName = selectedCover ? selectedCover.name : 'default.jpg';
        let musicFileName = selectedMusic ? selectedMusic.name : '';
        if (!selectedMusic) { showToast('❌ 请选择音乐文件'); return null; }

        let dataTitle = title + (artist ? ' ' + artist : '') + (keywords ? ' ' + keywords : '');
        dataTitle = dataTitle.replace(/\s+/g, ' ').trim();
        let displayTitle = title + (artist ? ' - ' + artist : '');
        const descHtml = desc ? `<div class="item-desc">${desc}</div>` : '';
        const cardHtml = `<div class="item-card" data-title="${dataTitle}">
        <img src="image/${coverFileName}" alt="${title} 封面">
        <div class="item-title">${displayTitle}</div>
        ${descHtml}
        <button class="download-btn" onclick="downloadMusic('music/${musicFileName}', '${musicFileName}')">
            <i class="fas fa-download"></i> 下载
        </button>
    </div>`;
        return { cardHtml, displayTitle, desc, coverFileName, musicFileName, dataTitle, title, artist, keywords, coverFile: selectedCover, musicFile: selectedMusic };
    }

    function handlePreview() {
        const data = generateCardData();
        if (!data) return;
        const coverSrc = selectedCover ? URL.createObjectURL(selectedCover) : 'image/default.jpg';
        previewBox.innerHTML = `
            <div class="preview-card">
                <img class="pc-img" src="${coverSrc}" alt="封面预览" onerror="this.src='https://picsum.photos/seed/error/400/240'" />
                <div class="pc-title">${data.displayTitle}</div>
                ${data.desc ? `<div class="pc-desc">${data.desc}</div>` : ''}
                <span class="pc-btn"><i class="fas fa-download"></i> 下载</span>
                <div class="pc-path">📁 image/${data.coverFileName} &nbsp;|&nbsp; 🎵 music/${data.musicFileName}</div>
            </div>
        `;
        previewBox.classList.add('has-preview');
        showToast('✅ 预览已生成');
    }

    // ========== 编码修复：正确处理 UTF-8 中文 ==========

    // 将字符串转为 Base64（支持中文）
    function utf8ToBase64(str) {
        const encoder = new TextEncoder();
        const data = encoder.encode(str);
        let binary = '';
        for (let i = 0; i < data.length; i++) {
            binary += String.fromCharCode(data[i]);
        }
        return btoa(binary);
    }

    // 将 Base64 转为 UTF-8 字符串（支持中文）
    function base64ToUtf8(base64) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
        }
        const decoder = new TextDecoder('utf-8');
        return decoder.decode(bytes);
    }

    // ========== Gitee API 辅助函数 ==========

    async function getFileInfo(path, token) {
        const url = GITEE_API + '/' + path + '?ref=' + GITEE_BRANCH;
        const resp = await fetch(url, {
            headers: { 'Authorization': 'token ' + token }
        });
        if (resp.status === 404) {
            return null;
        }
        if (!resp.ok) {
            throw new Error('获取文件信息失败');
        }
        return await resp.json();
    }

    async function createOrUpdateFile(path, content, token, message, sha) {
        if (!sha) {
            try {
                const info = await getFileInfo(path, token);
                if (info) {
                    sha = info.sha;
                }
            } catch (e) {}
        }

        // 使用 utf8ToBase64 正确处理中文
        const base64Content = utf8ToBase64(content);

        const payload = {
            message: message || '更新音乐卡片汇总',
            content: base64Content,
            branch: GITEE_BRANCH
        };
        if (sha) {
            payload.sha = sha;
        }

        const url = GITEE_API + '/' + path;
        const method = sha ? 'PUT' : 'POST';

        const resp = await fetch(url, {
            method: method,
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'token ' + token
            },
            body: JSON.stringify(payload)
        });

        if (resp.status === 409) {
            const info = await getFileInfo(path, token);
            if (!info) {
                throw new Error('文件冲突且无法获取文件信息');
            }
            const newSha = info.sha;
            const newPayload = { ...payload, sha: newSha };
            const retryResp = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'token ' + token
                },
                body: JSON.stringify(newPayload)
            });
            if (!retryResp.ok) {
                const err = await retryResp.json();
                throw new Error(err.message || '更新文件失败');
            }
            return await retryResp.json();
        }

        if (!resp.ok) {
            const err = await resp.json();
            throw new Error(err.message || '提交失败');
        }
        return await resp.json();
    }

    async function uploadFile(file, path, token, message) {
        const reader = new FileReader();
        return new Promise((resolve, reject) => {
            reader.onload = async function(e) {
                const base64 = e.target.result.split(',')[1];
                const payload = {
                    message: message || '上传文件',
                    content: base64,
                    branch: GITEE_BRANCH
                };
                try {
                    const resp = await fetch(GITEE_API + '/' + path, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'token ' + token
                        },
                        body: JSON.stringify(payload)
                    });
                    if (!resp.ok) {
                        const err = await resp.json();
                        reject(new Error(err.message || '上传失败'));
                    } else {
                        resolve(await resp.json());
                    }
                } catch (err) {
                    reject(err);
                }
            };
            reader.readAsDataURL(file);
        });
    }

    // ========== 主提交逻辑 ==========

    async function handleSubmit() {
        const data = generateCardData();
        if (!data) return;

        const token = tokenInput.value.trim();
        if (!token) {
            setSaveStatus('❌ 请输入提交授权码', 'error');
            showToast('❌ 请输入授权码');
            return;
        }

        setSaveStatus('⏳ 正在提交...', 'uploading');
        uploadProgress.classList.add('show');
        progressBar.style.width = '10%';

        try {
            if (selectedCover) {
                await uploadFile(selectedCover, 'image/' + selectedCover.name, token, '添加封面图片');
                progressBar.style.width = '30%';
            }
            await uploadFile(selectedMusic, 'music/' + selectedMusic.name, token, '添加音乐文件');
            progressBar.style.width = '50%';

            let existingContent = '';
            let sha = null;

            try {
                const fileInfo = await getFileInfo(CARDS_FILE, token);
                if (fileInfo && fileInfo.content) {
                    try {
                        // 使用 base64ToUtf8 正确解码中文
                        existingContent = base64ToUtf8(fileInfo.content);
                        sha = fileInfo.sha;
                    } catch (decodeErr) {
                        console.warn('解码现有文件失败，将作为空文件处理', decodeErr);
                        existingContent = '';
                        sha = null;
                    }
                }
            } catch (err) {
                console.warn('获取文件信息失败，将创建新文件', err);
            }

            const now = new Date();
            const dateStr = now.getFullYear() + '-' +
                String(now.getMonth()+1).padStart(2,'0') + '-' +
                String(now.getDate()).padStart(2,'0') + ' ' +
                String(now.getHours()).padStart(2,'0') + ':' +
                String(now.getMinutes()).padStart(2,'0');
            const comment = `<!-- 歌曲：${data.title} | 添加时间：${dateStr} -->`;
            const newCardBlock = `\n\n${comment}\n${data.cardHtml}`;

            let newContent = existingContent + newCardBlock;
            if (!existingContent) {
                newContent = `<!-- ===== 音乐卡片汇总文件 ===== -->\n<!-- 每个卡片以注释分隔，复制需要的卡片到音乐页面 -->\n${newCardBlock}`;
            }

            await createOrUpdateFile(CARDS_FILE, newContent, token, '追加音乐卡片', sha);
            progressBar.style.width = '80%';

            if (navigator.clipboard) {
                await navigator.clipboard.writeText(data.cardHtml);
            }
            progressBar.style.width = '100%';

            setSaveStatus(`✅ 提交成功！\n📋 卡片代码已复制到剪贴板，管理员会尽快处理。`, 'success');
            showToast('🎉 提交成功！');

        } catch (err) {
            setSaveStatus('❌ 提交失败: ' + err.message, 'error');
            showToast('❌ 提交失败，请检查授权码或网络');
            console.error(err);
        } finally {
            setTimeout(() => {
                uploadProgress.classList.remove('show');
                progressBar.style.width = '0%';
            }, 4000);
        }
    }

    function handleClear() {
        titleInput.value = ''; artistInput.value = ''; descInput.value = ''; keywordsInput.value = '';
        selectedCover = null; selectedMusic = null;
        coverFileInput.value = ''; musicFileInput.value = '';
        coverStatus.innerHTML = '未选择文件'; musicStatus.innerHTML = '未选择文件';
        coverUploadArea.style.borderColor = '#e2e8f0'; musicUploadArea.style.borderColor = '#e2e8f0';
        previewBox.innerHTML = `<div class="empty-msg"><i class="fas fa-image"></i>填写信息后点击「预览」</div>`;
        previewBox.classList.remove('has-preview');
        clearStatus();
        showToast('🗑️ 已清空');
    }

    generateBtn.addEventListener('click', handlePreview);
    submitBtn.addEventListener('click', handleSubmit);
    clearBtn.addEventListener('click', handleClear);
    document.querySelectorAll('input').forEach(inp => {
        inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); handlePreview(); } });
    });

    window.addEventListener('load', handlePreview);
})();
</script>
</body>
</html>
