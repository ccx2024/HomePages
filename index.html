<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CCX的个人博客 - 首页</title>
    <!-- Font Awesome 6 (免费图标库) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <!-- Iconify 图标库 (用于洛谷、CSDN 等) -->
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <style>
        /* ===== 全局样式 ===== */
        :root {
            --primary: #4f8cf7;
            --primary-dark: #3a6fd1;
            --bg: #f0f4ff;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            --radius: 16px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --nav-height: 68px;
        }
        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #e2e8f0;
            --text-light: #94a3b8;
            --border: #334155;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            transition: background var(--transition), color var(--transition);
            padding-top: var(--nav-height);
        }
        a {
            color: var(--primary);
            text-decoration: none;
            transition: color var(--transition);
        }
        a:hover {
            color: var(--primary-dark);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ===== 导航栏 ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--nav-height);
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            z-index: 1000;
            backdrop-filter: blur(12px);
            background: rgba(var(--card-bg-rgb, 255, 255, 255), 0.85);
            transition: background var(--transition), border-color var(--transition);
        }
        .navbar {
            --card-bg-rgb: 255, 255, 255;
        }
        [data-theme="dark"] .navbar {
            --card-bg-rgb: 30, 41, 59;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.5px;
        }
        .logo span {
            color: var(--primary);
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 28px;
            list-style: none;
        }
        .nav-links a {
            color: var(--text-light);
            font-weight: 500;
            font-size: 0.95rem;
            position: relative;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width var(--transition);
        }
        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }
        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text);
        }
        .theme-toggle {
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
            transition: background var(--transition), color var(--transition);
        }
        .theme-toggle:hover {
            background: var(--border);
            color: var(--text);
        }
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* ===== 首页特有 ===== */
        .hero {
            text-align: center;
            padding: 60px 0 20px;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero .subtitle {
            font-size: 1.3rem;
            color: var(--text-light);
            margin-top: 8px;
            font-style: italic;
        }

        /* ===== 时间卡片 ===== */
        .time-card {
            max-width: 700px;
            margin: 20px auto 10px;
            padding: 18px 28px;
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px 24px;
            transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
        }
        .time-date,
        .time-clock {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
            font-weight: 500;
        }
        .time-card .fa-calendar-alt,
        .time-card .fa-clock {
            color: var(--primary);
            font-size: 1.3rem;
            width: 1.6rem;
            text-align: center;
        }
        .time-date .date-text {
            font-weight: 600;
        }
        .time-date .weekday {
            color: var(--text-light);
            font-weight: 400;
            font-size: 0.95rem;
            margin-left: 4px;
        }
        .time-clock .clock-text {
            font-feature-settings: "tnum";
            font-weight: 600;
            letter-spacing: 0.5px;
            font-variant-numeric: tabular-nums;
        }
        @media (max-width: 600px) {
            .time-card {
                flex-direction: column;
                align-items: flex-start;
                padding: 16px 20px;
            }
            .time-date,
            .time-clock {
                font-size: 1rem;
                width: 100%;
            }
        }

        /* ===== 简介区域 ===== */
        .intro-section {
            max-width: 700px;
            margin: 30px auto 40px;
            padding: 28px 36px;
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            text-align: center;
            animation: slideInUp 0.8s ease both;
        }
        @keyframes slideInUp {
            0% {
                opacity: 0;
                transform: translateY(40px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .intro-section p {
            font-size: 1.2rem;
            font-weight: 500;
        }
        .intro-section .highlight {
            color: var(--primary);
            font-weight: 700;
        }
        .intro-section .intro-icons {
            margin-top: 12px;
            font-size: 2rem;
            display: flex;
            justify-content: center;
            gap: 24px;
            color: var(--text-light);
        }
        .intro-section .intro-icons i {
            transition: transform var(--transition), color var(--transition);
            cursor: default;
        }
        .intro-section .intro-icons i:hover {
            transform: scale(1.2);
            color: var(--primary);
        }

        /* ===== 常用网站 ===== */
        .links-section {
            max-width: 900px;
            margin: 0 auto 60px;
            padding: 24px 0;
        }
        .links-section h3 {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 28px;
            color: var(--text);
        }
        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }
        .link-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 12px;
            text-align: center;
            transition: all var(--transition);
            box-shadow: var(--shadow);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .link-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
            border-color: var(--primary);
        }
        .link-item img {
            width: 36px;
            height: 36px;
            object-fit: contain;
            border-radius: 6px;
            margin-bottom: 6px;
        }
        .link-item .link-name {
            font-weight: 600;
            font-size: 0.95rem;
            display: block;
        }
        .link-item .link-desc {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 2px;
            display: block;
        }

        /* ===== 通用卡片网格（其他页面用） ===== */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 28px;
            margin: 20px 0 40px;
        }
        .item-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 20px;
            box-shadow: var(--shadow);
            transition: all var(--transition);
        }
        .item-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
        }
        .item-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 10px;
            background: var(--bg);
        }
        .item-card .item-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin: 12px 0 6px;
        }
        .item-card .item-desc {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 12px;
        }
        .download-btn {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: background var(--transition);
        }
        .download-btn:hover {
            background: var(--primary-dark);
            color: #fff;
        }

        /* ===== 编程教学列表 ===== */
        .teach-list {
            list-style: none;
            margin: 16px 0;
        }
        .teach-list li {
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .teach-list li:last-child {
            border-bottom: none;
        }
        .teach-list .teach-name {
            font-weight: 500;
        }
        .teach-list .teach-link {
            font-size: 0.85rem;
        }

        /* ===== 文章投稿 ===== */
        .submit-area {
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 24px 28px;
            margin: 20px 0 32px;
            box-shadow: var(--shadow);
        }
        .submit-area h4 {
            font-size: 1.2rem;
            margin-bottom: 12px;
        }
        .submit-area input,
        .submit-area textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            transition: border var(--transition);
            margin-bottom: 12px;
        }
        .submit-area input:focus,
        .submit-area textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        .submit-area .submit-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 8px 28px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition);
        }
        .submit-area .submit-btn:hover {
            background: var(--primary-dark);
        }
        .article-list .post-item {
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 20px 24px;
            margin-bottom: 18px;
            box-shadow: var(--shadow);
        }
        .post-item .post-title {
            font-size: 1.2rem;
            font-weight: 700;
        }
        .post-item .post-meta {
            color: var(--text-light);
            font-size: 0.85rem;
            margin: 4px 0 8px;
        }
        .post-item .post-excerpt {
            color: var(--text-light);
        }

        /* ===== 页脚 ===== */
        .footer {
            border-top: 1px solid var(--border);
            padding: 28px 0;
            margin-top: 40px;
            text-align: center;
            color: var(--text-light);
            font-size: 0.9rem;
            background: var(--card-bg);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: var(--nav-height);
                left: 0;
                right: 0;
                background: var(--card-bg);
                padding: 20px 28px;
                gap: 16px;
                border-bottom: 1px solid var(--border);
                box-shadow: var(--shadow);
            }
            .nav-links.open {
                display: flex;
            }
            .mobile-menu-btn {
                display: block;
            }
            .hero h1 {
                font-size: 2.2rem;
            }
            .hero .subtitle {
                font-size: 1rem;
            }
            .intro-section {
                padding: 20px;
            }
            .link-grid {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            }
            .card-grid {
                grid-template-columns: 1fr;
            }
            .navbar {
                padding: 0 20px;
            }
        }
        @media (max-width: 480px) {
            .container {
                padding: 0 16px;
            }
            .hero h1 {
                font-size: 1.8rem;
            }
        }

        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
    </style>
</head>
<body>

    <!-- ===== 导航栏 ===== -->
    <nav class="navbar" id="navbar">
        <a href="index.html" class="logo">CCX<span>.</span></a>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html" class="active">首页</a></li>
            <li><a href="music.html">音乐</a></li>
            <li><a href="game.html">游戏</a></li>
            <li><a href="code.html">代码</a></li>
            <li><a href="aviation.html">航空</a></li>
            <li><a href="article.html">文章</a></li>
            <li>
                <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
                    <i class="fas fa-moon"></i>
                </button>
            </li>
        </ul>
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="菜单">
            <i class="fas fa-bars"></i>
        </button>
    </nav>

    <!-- ===== 主页内容 ===== -->
    <main class="container">

        <!-- Hero -->
        <div class="hero">
            <h1>CCX的个人博客</h1>
            <p class="subtitle">恰同学少年，风华正茂</p>
        </div>

        <!-- 时间 & 日历卡片 -->
        <div class="time-card">
            <div class="time-date">
                <span class="date-icon"><i class="far fa-calendar-alt"></i></span>
                <span class="date-text" id="currentDate">----年--月--日</span>
                <span class="weekday" id="currentWeekday">---</span>
            </div>
            <div class="time-clock">
                <span class="clock-icon"><i class="far fa-clock"></i></span>
                <span class="clock-text" id="currentTime">--:--:--</span>
            </div>
        </div>

        <!-- 简介区域 -->
        <div class="intro-section">
            <p>
                <span class="highlight">我是CCX</span>，
                <span class="highlight">我是航空爱好者</span>，
                <span class="highlight">我是编程爱好者</span>
            </p>
            <div class="intro-icons">
                <i class="fas fa-plane" title="航空"></i>
                <i class="fas fa-code" title="编程"></i>
                <i class="fas fa-music" title="音乐"></i>
                <i class="fas fa-gamepad" title="游戏"></i>
            </div>
        </div>

        <!-- 常用网站 -->
        <div class="links-section">
            <h3><i class="fas fa-link" style="color:var(--primary);"></i> 常用网站</h3>
            <div class="link-grid">
                <!-- GitHub -->
                <a href="https://github.com" target="_blank" class="link-item">
                    <img src="https://github.com/favicon.ico" alt="GitHub" />
                    <span class="link-name">GitHub</span>
                    <span class="link-desc">代码托管平台</span>
                </a>
                <!-- B站 -->
                <a href="https://bilibili.com" target="_blank" class="link-item">
                    <img src="https://www.bilibili.com/favicon.ico" alt="B站" />
                    <span class="link-name">B站</span>
                    <span class="link-desc">学习与娱乐社区</span>
                </a>
                <!-- 洛谷 -->
                <a href="https://www.luogu.com.cn" target="_blank" class="link-item">
                    <img src="https://www.luogu.com.cn/favicon.ico" alt="洛谷" />
                    <span class="link-name">洛谷</span>
                    <span class="link-desc">OI/ACM 在线题库</span>
                </a>
                <!-- Gitee -->
                <a href="https://gitee.com" target="_blank" class="link-item">
                    <img src="https://gitee.com/favicon.ico" alt="Gitee" />
                    <span class="link-name">Gitee</span>
                    <span class="link-desc">国内代码托管</span>
                </a>
                <!-- OI Wiki -->
                <a href="https://oi-wiki.org" target="_blank" class="link-item">
                    <img src="https://oi-wiki.org/favicon.ico" alt="OI Wiki" />
                    <span class="link-name">OI Wiki</span>
                    <span class="link-desc">OI 知识整合</span>
                </a>
                <!-- DJI 大疆 -->
                <a href="https://www.dji.com" target="_blank" class="link-item">
                    <img src="https://www.dji.com/favicon.ico" alt="DJI" />
                    <span class="link-name">DJI 大疆</span>
                    <span class="link-desc">无人机与航拍</span>
                </a>
                <!-- DeepSeek -->
                <a href="https://www.deepseek.com" target="_blank" class="link-item">
                    <img src="https://www.deepseek.com/favicon.ico" alt="DeepSeek" />
                    <span class="link-name">DeepSeek</span>
                    <span class="link-desc">AI 对话助手</span>
                </a>
                <!-- Cloudflare -->
                <a href="https://www.cloudflare.com" target="_blank" class="link-item">
                    <img src="https://www.cloudflare.com/favicon.ico" alt="Cloudflare" />
                    <span class="link-name">Cloudflare</span>
                    <span class="link-desc">CDN & 网络安全</span>
                </a>
            </div>
        </div>

    </main>

    <!-- ===== 页脚 ===== -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 CCX · 用 <span style="color:#f472b6;">♥</span> 书写 · 保持好奇</p>
            <p style="margin-top:4px; font-size:0.8rem;"><i class="fas fa-code"></i> 简洁 · 优雅 · 有温度</p>
        </div>
    </footer>

    <script>
        (function() {
            // ---------- 主题切换 ----------
            const themeToggle = document.getElementById('themeToggle');
            const icon = themeToggle.querySelector('i');
            let currentTheme = localStorage.getItem('blog-theme') || 'light';

            function setTheme(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
                localStorage.setItem('blog-theme', theme);
                currentTheme = theme;
            }
            setTheme(currentTheme);

            themeToggle.addEventListener('click', function() {
                setTheme(currentTheme === 'light' ? 'dark' : 'light');
            });

            // ---------- 移动端菜单 ----------
            const mobileBtn = document.getElementById('mobileMenuBtn');
            const navLinks = document.getElementById('navLinks');
            mobileBtn.addEventListener('click', function() {
                navLinks.classList.toggle('open');
                const i = this.querySelector('i');
                i.classList.toggle('fa-bars');
                i.classList.toggle('fa-times');
            });

            navLinks.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', function() {
                    if (window.innerWidth <= 768) {
                        navLinks.classList.remove('open');
                        const i = mobileBtn.querySelector('i');
                        i.classList.add('fa-bars');
                        i.classList.remove('fa-times');
                    }
                });
            });

            // ---------- 导航栏阴影 ----------
            const navbar = document.getElementById('navbar');
            window.addEventListener('scroll', function() {
                navbar.style.boxShadow = window.scrollY > 20 ? '0 4px 20px rgba(0,0,0,0.06)' : 'none';
            }, { passive: true });

            // ===== 时钟 & 日历更新 =====
            function updateClockAndCalendar() {
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
                const weekday = weekdays[now.getDay()];
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const seconds = String(now.getSeconds()).padStart(2, '0');

                document.getElementById('currentDate').textContent = `${year}年${month}月${day}日`;
                document.getElementById('currentWeekday').textContent = weekday;
                document.getElementById('currentTime').textContent = `${hours}:${minutes}:${seconds}`;
            }

            updateClockAndCalendar();
            setInterval(updateClockAndCalendar, 1000);

        })();
    </script>

</body>
</html>
